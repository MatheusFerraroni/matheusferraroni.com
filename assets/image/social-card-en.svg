<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Matheus Ferraroni Sanches — CTO, Professor and AI Researcher</title>
  <desc id="description">Social card in deep blue tones with cyan and amber accents and a subtle particle network.</desc>
  <defs>
    <linearGradient id="background" x1="60" y1="32" x2="1140" y2="598" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0A1B30"/>
      <stop offset="1" stop-color="#102A46"/>
    </linearGradient>
    <radialGradient id="cyan-glow" cx="0" cy="0" r="1" gradientTransform="translate(1032 116) rotate(137) scale(452 338)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber-glow" cx="0" cy="0" r="1" gradientTransform="translate(173 608) rotate(-38) scale(417 268)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B" stop-opacity="0.16"/>
