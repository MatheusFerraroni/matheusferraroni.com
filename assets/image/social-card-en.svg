    <linearGradient id="accent-line" x1="88" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.62" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="dot-grid" width="36" height="36" patternUnits="userSpaceOnUse">
